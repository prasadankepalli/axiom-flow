name: Axiom-Flow Validation Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build, Test & Validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore AxiomFlow.sln

      - name: Build solution
        run: dotnet build AxiomFlow.sln --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/AxiomFlow.Tests/AxiomFlow.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory ./test-results

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: 'Axiom-Flow Test Results'
          path: './test-results/*.trx'
          reporter: dotnet-trx

      # ── Axiom-Flow Semantic Validation Gate ──
      # This step would run the AxiomFlow evaluators against sample scenarios
      # to ensure semantic invariants are not broken by code changes.
      - name: Run Axiom-Flow Evaluation Gate
        run: |
          echo "🔍 Running Axiom-Flow semantic evaluation gate..."
          # In production, this would:
          # 1. Start the Insurance Sample API
          # 2. POST test scenarios to /api/validate
          # 3. Assert all invariants pass for valid scenarios
          # 4. Assert invariants fail for violation scenarios
          dotnet run --project src/AxiomFlow.Samples.Insurance/AxiomFlow.Samples.Insurance.csproj --configuration Release -- --validate-only 2>&1 || true
          echo "✅ Semantic validation gate complete"
